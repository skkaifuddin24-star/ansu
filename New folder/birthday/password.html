<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  font-family: sans-serif;
  overflow: hidden;
}

/* Container */
.container {
  background: white;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

input {
  padding: 10px;
  width: 200px;
  margin-top: 10px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  background: #ff4b5c;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#message {
  margin-top: 10px;
  color: red;
}

/* ❤️ Heart animation */
.heart {
  position: absolute;
  font-size: 20px;
  animation: floatUp 2s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-200px) scale(1.5); }
}

/* Fade out */
.fade-out {
  animation: fadeOut 1.5s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(0.9);
  }
}

/* 😈 SHAKE */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translate(0); }
  20% { transform: translate(-8px, 0); }
  40% { transform: translate(8px, 0); }
  60% { transform: translate(-6px, 0); }
  80% { transform: translate(6px, 0); }
  100% { transform: translate(0); }
}

/* 💥 RED FLASH */
.flash {
  animation: flashRed 0.4s;
}

@keyframes flashRed {
  0% { background-color: rgba(255,0,0,0.2); }
  50% { background-color: rgba(255,0,0,0.5); }
  100% { background-color: transparent; }
}

</style>
</head>

<body>

<div class="container">
  <h2>Enter the Secret Password 🔐</h2>
  <input type="password" id="password" placeholder="Hint: Our special date 👀">
  <br>
  <button onclick="checkPassword()">Unlock 💖</button>
  <p id="message"></p>
</div>

<!-- 🔊 Sound -->
<audio id="errorSound" src="error.mp3.mp3"></audio>

<script>
let attempts = 0;

function checkPassword() {
  const input = document.getElementById("password").value;
  const message = document.getElementById("message");
  const container = document.querySelector(".container");
  const sound = document.getElementById("errorSound");

  const correctPassword = "15"; 

  if (input === correctPassword) {
    message.style.color = "green";
    message.innerText = "Unlocking your surprise... 💖";

    // ❤️ Heart burst
    for (let i = 0; i < 15; i++) {
      let heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerText = "❤️";
      heart.style.left = Math.random() * 100 + "%";
      heart.style.top = "50%";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 2000);
    }

    // Fade out
    container.classList.add("fade-out");

    setTimeout(() => {
      window.location.href = "key.html";
    }, 1500);

  } else {
    attempts++;

    message.style.color = "red";

    // 😈 Shake
    document.body.classList.add("shake");

    // 💥 Red flash
    document.body.classList.add("flash");

    // 🔊 Sound
    sound.currentTime = 0;
    sound.play().catch(() => {});

    setTimeout(() => {
      document.body.classList.remove("shake");
      document.body.classList.remove("flash");
    }, 400);

    // 😆 Funny messages
    if (attempts === 1) {
      message.innerText = "GUESS IT WRONGG BABYYY";
    } else if (attempts === 2) {
      message.innerText = "ARE U SERIOUS???";
    } else {
      message.innerText = "Hint: AB TO KARLE GUESS BROO";
    }
  }
}

// ⌨️ Enter key
document.getElementById("password").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    checkPassword();
  }
});
</script>

    <!-- 10X Premium Features -->
    <link rel="stylesheet" href="10x-features.css">
    <script src="10x-features.js"></script>
</body>
</html>
